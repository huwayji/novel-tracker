<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novel Tracker Ultimate - Advanced Analytics & Progress Tracking</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.44.0/tabler-icons.min.css">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        :root {
            --theme: 'default';
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --primary-light: #818cf8;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --info: #3b82f6;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-400: #9ca3af;
            --gray-500: #6b7280;
            --gray-600: #4b5563;
            --gray-700: #374151;
            --gray-800: #1f2937;
            --gray-900: #111827;
            
            --bg-primary: white;
            --bg-secondary: #f9fafb;
            --text-primary: #111827;
            --text-secondary: #6b7280;
            --border-color: #e5e7eb;
        }

        [data-theme="dark"] {
            --bg-primary: #1f2937;
            --bg-secondary: #111827;
            --text-primary: #f9fafb;
            --text-secondary: #d1d5db;
            --border-color: #374151;
        }

        [data-theme-color="ocean"] {
            --primary: #0ea5e9;
            --primary-dark: #0284c7;
            --primary-light: #38bdf8;
            --success: #06b6d4;
        }

        [data-theme-color="sunset"] {
            --primary: #f97316;
            --primary-dark: #ea580c;
            --primary-light: #fb923c;
        }

        [data-theme-color="forest"] {
            --primary: #059669;
            --primary-dark: #047857;
            --primary-light: #10b981;
        }

        [data-theme-color="purple"] {
            --primary: #a855f7;
            --primary-dark: #9333ea;
            --primary-light: #c084fc;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: var(--text-primary);
            transition: background 0.3s;
        }

        [data-theme="dark"] body {
            background: linear-gradient(135deg, #1a1a2e 0%, #0f3460 100%);
        }

        #root {
            min-height: 100vh;
        }

        .main-layout {
            display: grid;
            grid-template-columns: 1fr;
            min-height: 100vh;
        }

        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 280px;
            height: 100vh;
            background: var(--bg-primary);
            border-right: 1px solid var(--border-color);
            padding: 20px;
            overflow-y: auto;
            z-index: 1000;
            display: none;
        }

        .sidebar.open {
            display: block;
        }

        .sidebar-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
            font-size: 24px;
        }

        .sidebar-section {
            margin-bottom: 24px;
        }

        .sidebar-section h3 {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }

        .sidebar-item {
            padding: 10px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
            margin-bottom: 6px;
            border: 1px solid transparent;
        }

        .sidebar-item:hover {
            background: var(--bg-secondary);
            border-color: var(--primary);
        }

        .sidebar-item.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .content {
            margin-left: 0;
            padding: 20px;
        }

        @media (min-width: 1024px) {
            .main-layout {
                grid-template-columns: 280px 1fr;
            }

            .sidebar {
                display: block;
                position: relative;
                left: auto;
                top: auto;
                height: auto;
                border-right: 1px solid var(--border-color);
            }

            .content {
                margin-left: 0;
            }

            .menu-toggle {
                display: none;
            }
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            margin-bottom: 24px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.1);
            border-radius: 12px;
            flex-wrap: wrap;
            gap: 16px;
        }

        .header-title h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .header-title p {
            font-size: 13px;
            opacity: 0.9;
        }

        .header-controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .btn-icon {
            padding: 10px;
            width: 40px;
            height: 40px;
        }

        .btn-text {
            background: transparent;
            color: var(--text-primary);
            border: none;
            padding: 8px 12px;
        }

        .btn-text:hover {
            background: var(--bg-secondary);
        }

        .theme-picker {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }

        .theme-option {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.3s;
        }

        .theme-option:hover {
            transform: scale(1.05);
        }

        .theme-option.active {
            border-color: var(--text-primary);
            box-shadow: 0 0 0 2px var(--bg-primary);
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .stat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .stat-icon {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: white;
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .stat-subtext {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .progress-ring {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .ring-chart {
            width: 100px;
            height: 100px;
            position: relative;
        }

        .ring-text {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .chart-container {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 24px;
        }

        .chart-container h3 {
            margin-bottom: 16px;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .content-wrapper {
            display: grid;
            grid-template-columns: 1fr;
            gap: 24px;
        }

        .novels-section {
            background: var(--bg-primary);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            padding: 24px;
            min-height: 400px;
        }

        .toolbar {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
        }

        .search-box {
            display: flex;
            align-items: center;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 8px 12px;
            flex: 1;
            min-width: 200px;
        }

        .search-box input {
            background: transparent;
            border: none;
            outline: none;
            flex: 1;
            color: var(--text-primary);
            font-size: 14px;
        }

        .search-box input::placeholder {
            color: var(--text-secondary);
        }

        .view-toggle {
            display: flex;
            gap: 4px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 4px;
        }

        .view-btn {
            padding: 6px 12px;
            border-radius: 6px;
            border: none;
            background: transparent;
            cursor: pointer;
            color: var(--text-secondary);
        }

        .view-btn.active {
            background: var(--primary);
            color: white;
        }

        .novels-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 16px;
        }

        .novels-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .novel-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .novel-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.1);
            border-color: var(--primary);
        }

        .novel-cover {
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, var(--primary-light) 0%, var(--primary) 100%);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            overflow: hidden;
        }

        .novel-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .novel-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--success);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }

        .novel-badge.paused {
            background: var(--warning);
        }

        .novel-badge.dropped {
            background: var(--danger);
        }

        .novel-badge.completed {
            background: var(--info);
        }

        .novel-content {
            padding: 16px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .novel-title {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .novel-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            font-size: 12px;
            margin-bottom: 12px;
        }

        .novel-stat {
            background: var(--bg-primary);
            padding: 8px;
            border-radius: 6px;
            text-align: center;
        }

        .novel-stat-value {
            font-size: 14px;
            font-weight: 700;
            color: var(--primary);
        }

        .novel-stat-label {
            font-size: 11px;
            color: var(--text-secondary);
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: var(--bg-primary);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 8px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary) 0%, var(--primary-light) 100%);
            transition: width 0.3s;
        }

        .streak-badge {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 12px;
            color: var(--warning);
            font-weight: 600;
            margin-bottom: 8px;
        }

        .novel-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            margin-top: auto;
        }

        .novel-actions button {
            padding: 8px;
            font-size: 12px;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            border-radius: 6px;
        }

        .novel-actions button:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .list-item {
            display: flex;
            gap: 12px;
            padding: 16px;
            background: var(--bg-secondary);
            border-radius: 8px;
            border: 1px solid var(--border-color);
            align-items: center;
        }

        .list-item-cover {
            width: 60px;
            height: 80px;
            border-radius: 6px;
            background: linear-gradient(135deg, var(--primary-light) 0%, var(--primary) 100%);
            flex-shrink: 0;
        }

        .list-item-content {
            flex: 1;
        }

        .list-item-title {
            font-weight: 700;
            margin-bottom: 4px;
            color: var(--text-primary);
        }

        .list-item-meta {
            font-size: 13px;
            color: var(--text-secondary);
            display: flex;
            gap: 12px;
            margin-bottom: 8px;
        }

        .list-item-progress {
            width: 100px;
            height: 4px;
            background: var(--bg-primary);
            border-radius: 2px;
            overflow: hidden;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state i {
            font-size: 64px;
            margin-bottom: 16px;
            color: var(--text-secondary);
            opacity: 0.3;
        }

        .empty-state h3 {
            font-size: 20px;
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        .achievement-badge {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 16px;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
        }

        .achievement-icon {
            font-size: 32px;
            margin-bottom: 8px;
        }

        .achievement-name {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .achievement-desc {
            font-size: 11px;
            color: var(--text-secondary);
        }

        .achievement-badge.locked {
            opacity: 0.5;
        }

        .fab {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.4);
            transition: all 0.3s;
            z-index: 100;
        }

        .fab:hover {
            transform: scale(1.1);
            box-shadow: 0 15px 40px rgba(99, 102, 241, 0.5);
        }

        @media (max-width: 768px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }

            .toolbar {
                flex-direction: column;
                align-items: stretch;
            }

            .search-box {
                min-width: unset;
            }

            .novels-grid {
                grid-template-columns: 1fr;
            }

            .novels-list .novel-card {
                flex-direction: row;
            }

            .novel-cover {
                width: 100px;
                height: 100px;
                flex-shrink: 0;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function NovelTrackerUltimate() {
            const [currentPage, setCurrentPage] = useState('dashboard');
            const [novels, setNovels] = useState([]);
            const [darkMode, setDarkMode] = useState(false);
            const [themeColor, setThemeColor] = useState('default');
            const [showAddModal, setShowAddModal] = useState(false);
            const [editingId, setEditingId] = useState(null);
            const [viewMode, setViewMode] = useState('grid');
            const [searchQuery, setSearchQuery] = useState('');
            const [sidebarOpen, setSidebarOpen] = useState(false);

            const [formData, setFormData] = useState({
                title: '',
                totalChapters: '',
                currentChapter: '',
                imageUrl: '',
                status: 'reading',
                rating: 0,
                notes: '',
                author: '',
                genre: '',
                dateAdded: new Date().toISOString().split('T')[0]
            });

            useEffect(() => {
                const saved = localStorage.getItem('novels-ultimate');
                if (saved) setNovels(JSON.parse(saved));
                
                const savedDarkMode = localStorage.getItem('darkMode');
                if (savedDarkMode) setDarkMode(JSON.parse(savedDarkMode));
                
                const savedTheme = localStorage.getItem('themeColor');
                if (savedTheme) setThemeColor(savedTheme);
            }, []);

            useEffect(() => {
                localStorage.setItem('novels-ultimate', JSON.stringify(novels));
            }, [novels]);

            useEffect(() => {
                localStorage.setItem('darkMode', JSON.stringify(darkMode));
                if (darkMode) {
                    document.documentElement.setAttribute('data-theme', 'dark');
                } else {
                    document.documentElement.removeAttribute('data-theme');
                }
            }, [darkMode]);

            useEffect(() => {
                localStorage.setItem('themeColor', themeColor);
                document.documentElement.setAttribute('data-theme-color', themeColor);
            }, [themeColor]);

            const handleSaveNovel = (e) => {
                e.preventDefault();
                if (formData.title && formData.totalChapters) {
                    if (editingId) {
                        setNovels(novels.map(n =>
                            n.id === editingId ? { ...n, ...formData, totalChapters: parseInt(formData.totalChapters), currentChapter: parseInt(formData.currentChapter) || 0 } : n
                        ));
                    } else {
                        const newNovel = {
                            id: Date.now(),
                            ...formData,
                            totalChapters: parseInt(formData.totalChapters),
                            currentChapter: parseInt(formData.currentChapter) || 0
                        };
                        setNovels([newNovel, ...novels]);
                    }
                    setShowAddModal(false);
                    resetForm();
                }
            };

            const resetForm = () => {
                setFormData({
                    title: '',
                    totalChapters: '',
                    currentChapter: '',
                    imageUrl: '',
                    status: 'reading',
                    rating: 0,
                    notes: '',
                    author: '',
                    genre: '',
                    dateAdded: new Date().toISOString().split('T')[0]
                });
                setEditingId(null);
            };

            const deleteNovel = (id) => {
                if (confirm('Delete this novel?')) {
                    setNovels(novels.filter(n => n.id !== id));
                }
            };

            const updateProgress = (id, newChapter) => {
                setNovels(novels.map(n =>
                    n.id === id ? { ...n, currentChapter: Math.min(newChapter, n.totalChapters) } : n
                ));
            };

            const editNovel = (novel) => {
                setFormData({
                    title: novel.title,
                    totalChapters: novel.totalChapters.toString(),
                    currentChapter: novel.currentChapter.toString(),
                    imageUrl: novel.imageUrl,
                    status: novel.status,
                    rating: novel.rating || 0,
                    notes: novel.notes || '',
                    author: novel.author || '',
                    genre: novel.genre || '',
                    dateAdded: novel.dateAdded
                });
                setEditingId(novel.id);
                setShowAddModal(true);
            };

            const exportData = () => {
                const dataStr = JSON.stringify(novels, null, 2);
                const dataBlob = new Blob([dataStr], { type: 'application/json' });
                const url = URL.createObjectURL(dataBlob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `novel-tracker-backup-${new Date().toISOString().split('T')[0]}.json`;
                link.click();
            };

            const importData = (e) => {
                const file = e.target.files?.[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        try {
                            const imported = JSON.parse(event.target.result);
                            setNovels([...novels, ...imported]);
                            alert('Data imported successfully!');
                        } catch {
                            alert('Error importing file');
                        }
                    };
                    reader.readAsText(file);
                }
            };

            const getProgress = (current, total) => {
                return total > 0 ? Math.round((current / total) * 100) : 0;
            };

            const filtered = novels.filter(n =>
                n.title.toLowerCase().includes(searchQuery.toLowerCase())
            );

            const stats = {
                total: novels.length,
                reading: novels.filter(n => n.status === 'reading').length,
                completed: novels.filter(n => n.status === 'completed').length,
                totalChapters: novels.reduce((sum, n) => sum + n.currentChapter, 0),
                avgRating: novels.length > 0 ? (novels.reduce((sum, n) => sum + (n.rating || 0), 0) / novels.length).toFixed(1) : 0,
                totalChaptersAvailable: novels.reduce((sum, n) => sum + n.totalChapters, 0)
            };

            const achievements = [
                { id: 1, name: 'Bookworm', icon: '📖', desc: '10 novels', unlocked: stats.total >= 10 },
                { id: 2, name: 'Speed Reader', icon: '⚡', desc: '100 chapters', unlocked: stats.totalChapters >= 100 },
                { id: 3, name: 'Completionist', icon: '✅', desc: 'Complete a novel', unlocked: stats.completed >= 1 },
                { id: 4, name: 'Collections', icon: '📚', desc: 'Add 20 novels', unlocked: stats.total >= 20 },
                { id: 5, name: 'Critic', icon: '⭐', desc: 'Rate 5 novels', unlocked: novels.filter(n => n.rating > 0).length >= 5 },
                { id: 6, name: 'Marathon', icon: '🏃', desc: '500 chapters', unlocked: stats.totalChapters >= 500 }
            ];

            const DashboardView = () => (
                <>
                    <div className="header">
                        <div className="header-title">
                            <h1>Welcome back!</h1>
                            <p>Track your reading progress</p>
                        </div>
                        <div className="header-controls">
                            <button className="btn-secondary btn-icon" onClick={() => setDarkMode(!darkMode)}>
                                <i className={`ti ${darkMode ? 'ti-sun' : 'ti-moon'}`}></i>
                            </button>
                            <button className="btn-secondary btn-sm" onClick={exportData}>
                                <i className="ti ti-download"></i> Export
                            </button>
                            <label className="btn-secondary btn-sm" style={{ cursor: 'pointer' }}>
                                <i className="ti ti-upload"></i> Import
                                <input type="file" accept=".json" onChange={importData} style={{ display: 'none' }} />
                            </label>
                        </div>
                    </div>

                    <div className="dashboard-grid">
                        <div className="stat-card">
                            <div className="stat-header">
                                <div>
                                    <div className="stat-label">Total Novels</div>
                                    <div className="stat-value">{stats.total}</div>
                                </div>
                                <div className="stat-icon" style={{ background: 'linear-gradient(135deg, #667eea, #764ba2)' }}>
                                    <i className="ti ti-books"></i>
                                </div>
                            </div>
                            <div className="stat-subtext">
                                {stats.reading} reading • {stats.completed} completed
                            </div>
                        </div>

                        <div className="stat-card">
                            <div className="stat-header">
                                <div>
                                    <div className="stat-label">Chapters Read</div>
                                    <div className="stat-value">{stats.totalChapters}</div>
                                </div>
                                <div className="stat-icon" style={{ background: 'linear-gradient(135deg, #f093fb, #f5576c)' }}>
                                    <i className="ti ti-reading"></i>
                                </div>
                            </div>
                            <div className="stat-subtext">
                                of {stats.totalChaptersAvailable} total
                            </div>
                        </div>

                        <div className="stat-card">
                            <div className="stat-header">
                                <div>
                                    <div className="stat-label">Average Rating</div>
                                    <div className="stat-value">{stats.avgRating}</div>
                                </div>
                                <div className="stat-icon" style={{ background: 'linear-gradient(135deg, #fa709a, #fee140)' }}>
                                    <i className="ti ti-star"></i>
                                </div>
                            </div>
                            <div className="stat-subtext">
                                Based on {novels.filter(n => n.rating > 0).length} rated novels
                            </div>
                        </div>

                        <div className="stat-card">
                            <div className="stat-header">
                                <div>
                                    <div className="stat-label">Overall Progress</div>
                                    <div className="stat-value">{stats.totalChaptersAvailable > 0 ? Math.round((stats.totalChapters / stats.totalChaptersAvailable) * 100) : 0}%</div>
                                </div>
                                <div className="stat-icon" style={{ background: 'linear-gradient(135deg, #4facfe, #00f2fe)' }}>
                                    <i className="ti ti-chart-line"></i>
                                </div>
                            </div>
                            <div className="progress-bar">
                                <div className="progress-fill" style={{ width: `${stats.totalChaptersAvailable > 0 ? (stats.totalChapters / stats.totalChaptersAvailable) * 100 : 0}%` }}></div>
                            </div>
                        </div>
                    </div>

                    <div className="content-wrapper">
                        <div className="chart-container">
                            <h3><i className="ti ti-trophy"></i> Achievements</h3>
                            <div className="dashboard-grid">
                                {achievements.map(achievement => (
                                    <div key={achievement.id} className={`achievement-badge ${!achievement.unlocked ? 'locked' : ''}`}>
                                        <div className="achievement-icon">{achievement.icon}</div>
                                        <div className="achievement-name">{achievement.name}</div>
                                        <div className="achievement-desc">{achievement.desc}</div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </>
            );

            const NovelsView = () => (
                <>
                    <div className="novels-section">
                        <div className="toolbar">
                            <div className="search-box">
                                <i className="ti ti-search"></i>
                                <input
                                    type="text"
                                    placeholder="Search novels..."
                                    value={searchQuery}
                                    onChange={(e) => setSearchQuery(e.target.value)}
                                />
                            </div>
                            <div className="view-toggle">
                                <button className={`view-btn ${viewMode === 'grid' ? 'active' : ''}`} onClick={() => setViewMode('grid')}>
                                    <i className="ti ti-grid-dots"></i>
                                </button>
                                <button className={`view-btn ${viewMode === 'list' ? 'active' : ''}`} onClick={() => setViewMode('list')}>
                                    <i className="ti ti-list"></i>
                                </button>
                            </div>
                        </div>

                        {filtered.length === 0 ? (
                            <div className="empty-state">
                                <i className="ti ti-inbox"></i>
                                <h3>No novels found</h3>
                                <p>{novels.length === 0 ? 'Add your first novel to get started!' : 'No novels match your search.'}</p>
                            </div>
                        ) : (
                            <div className={viewMode === 'grid' ? 'novels-grid' : 'novels-list'}>
                                {filtered.map(novel => {
                                    const progress = getProgress(novel.currentChapter, novel.totalChapters);
                                    return viewMode === 'grid' ? (
                                        <div key={novel.id} className="novel-card">
                                            <div className="novel-cover">
                                                {novel.imageUrl ? (
                                                    <img src={novel.imageUrl} alt={novel.title} onError={(e) => e.target.style.display = 'none'} />
                                                ) : (
                                                    <i className="ti ti-photo" style={{ fontSize: '48px' }}></i>
                                                )}
                                                <div className={`novel-badge ${novel.status}`}>{novel.status}</div>
                                            </div>
                                            <div className="novel-content">
                                                <div className="novel-title">{novel.title}</div>
                                                {novel.author && <div style={{ fontSize: '12px', color: 'var(--text-secondary)', marginBottom: '8px' }}>{novel.author}</div>}
                                                <div className="novel-stats">
                                                    <div className="novel-stat">
                                                        <div className="novel-stat-value">{novel.currentChapter}/{novel.totalChapters}</div>
                                                        <div className="novel-stat-label">Chapters</div>
                                                    </div>
                                                    <div className="novel-stat">
                                                        <div className="novel-stat-value">{progress}%</div>
                                                        <div className="novel-stat-label">Progress</div>
                                                    </div>
                                                </div>
                                                <div className="progress-bar">
                                                    <div className="progress-fill" style={{ width: `${progress}%` }}></div>
                                                </div>
                                                {novel.rating > 0 && (
                                                    <div style={{ fontSize: '13px', marginBottom: '8px', color: 'var(--warning)' }}>
                                                        {'⭐'.repeat(Math.floor(novel.rating))} {novel.rating}
                                                    </div>
                                                )}
                                                <div className="novel-actions">
                                                    <button onClick={() => updateProgress(novel.id, novel.currentChapter + 1)}>
                                                        <i className="ti ti-plus"></i>
                                                    </button>
                                                    <button onClick={() => editNovel(novel)}>
                                                        <i className="ti ti-edit"></i>
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                    ) : (
                                        <div key={novel.id} className="list-item">
                                            <div className="list-item-cover" style={{ background: `linear-gradient(135deg, var(--primary-light) 0%, var(--primary) 100%)` }}></div>
                                            <div className="list-item-content">
                                                <div className="list-item-title">{novel.title}</div>
                                                <div className="list-item-meta">
                                                    <span>{novel.currentChapter}/{novel.totalChapters}</span>
                                                    <span>{progress}%</span>
                                                    {novel.rating > 0 && <span>{'⭐'.repeat(Math.floor(novel.rating))}</span>}
                                                </div>
                                                <div className="list-item-progress">
                                                    <div style={{ height: '100%', width: `${progress}%`, background: 'var(--primary)' }}></div>
                                                </div>
                                            </div>
                                            <div style={{ display: 'flex', gap: '8px' }}>
                                                <button className="btn-text" onClick={() => updateProgress(novel.id, novel.currentChapter + 1)}>
                                                    <i className="ti ti-plus"></i>
                                                </button>
                                                <button className="btn-text" onClick={() => editNovel(novel)}>
                                                    <i className="ti ti-edit"></i>
                                                </button>
                                                <button className="btn-text" onClick={() => deleteNovel(novel.id)} style={{ color: 'var(--danger)' }}>
                                                    <i className="ti ti-trash"></i>
                                                </button>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        )}
                    </div>
                </>
            );

            const SettingsView = () => (
                <div className="novels-section" style={{ maxWidth: '500px' }}>
                    <h2 style={{ marginBottom: '24px' }}>Settings</h2>
                    
                    <div style={{ marginBottom: '24px' }}>
                        <h3 style={{ fontSize: '14px', fontWeight: '600', marginBottom: '12px', color: 'var(--text-primary)' }}>Theme Color</h3>
                        <div className="theme-picker">
                            <div
                                className={`theme-option ${themeColor === 'default' ? 'active' : ''}`}
                                style={{ background: 'linear-gradient(135deg, #667eea, #764ba2)' }}
                                onClick={() => setThemeColor('default')}
                            ></div>
                            <div
                                className={`theme-option ${themeColor === 'ocean' ? 'active' : ''}`}
                                style={{ background: 'linear-gradient(135deg, #0ea5e9, #06b6d4)' }}
                                onClick={() => setThemeColor('ocean')}
                            ></div>
                            <div
                                className={`theme-option ${themeColor === 'sunset' ? 'active' : ''}`}
                                style={{ background: 'linear-gradient(135deg, #f97316, #ea580c)' }}
                                onClick={() => setThemeColor('sunset')}
                            ></div>
                            <div
                                className={`theme-option ${themeColor === 'forest' ? 'active' : ''}`}
                                style={{ background: 'linear-gradient(135deg, #059669, #047857)' }}
                                onClick={() => setThemeColor('forest')}
                            ></div>
                            <div
                                className={`theme-option ${themeColor === 'purple' ? 'active' : ''}`}
                                style={{ background: 'linear-gradient(135deg, #a855f7, #9333ea)' }}
                                onClick={() => setThemeColor('purple')}
                            ></div>
                        </div>
                    </div>

                    <div style={{ marginBottom: '24px' }}>
                        <label style={{ display: 'flex', alignItems: 'center', gap: '12px', cursor: 'pointer' }}>
                            <input type="checkbox" checked={darkMode} onChange={(e) => setDarkMode(e.target.checked)} />
                            <span>Dark Mode</span>
                        </label>
                    </div>

                    <button className="btn-primary" onClick={exportData} style={{ width: '100%', marginBottom: '12px' }}>
                        <i className="ti ti-download"></i> Export Data
                    </button>
                    <label style={{ display: 'block' }}>
                        <button className="btn-secondary" style={{ width: '100%' }}>
                            <i className="ti ti-upload"></i> Import Data
                        </button>
                        <input type="file" accept=".json" onChange={importData} style={{ display: 'none' }} />
                    </label>
                </div>
            );

            return (
                <div className="main-layout">
                    <div className={`sidebar ${sidebarOpen ? 'open' : ''}`}>
                        <div className="sidebar-header">
                            <i className="ti ti-book-2"></i>
                            <span>Novel Tracker</span>
                        </div>

                        <div className="sidebar-section">
                            <h3>Navigation</h3>
                            <div className={`sidebar-item ${currentPage === 'dashboard' ? 'active' : ''}`} onClick={() => { setCurrentPage('dashboard'); setSidebarOpen(false); }}>
                                <i className="ti ti-home"></i> Dashboard
                            </div>
                            <div className={`sidebar-item ${currentPage === 'novels' ? 'active' : ''}`} onClick={() => { setCurrentPage('novels'); setSidebarOpen(false); }}>
                                <i className="ti ti-bookmarks"></i> My Novels
                            </div>
                            <div className={`sidebar-item ${currentPage === 'settings' ? 'active' : ''}`} onClick={() => { setCurrentPage('settings'); setSidebarOpen(false); }}>
                                <i className="ti ti-settings"></i> Settings
                            </div>
                        </div>
                    </div>

                    <div className="content">
                        {currentPage === 'dashboard' && <DashboardView />}
                        {currentPage === 'novels' && <NovelsView />}
                        {currentPage === 'settings' && <SettingsView />}

                        {showAddModal && (
                            <div style={{ position: 'fixed', top: 0, left: 0, right: 0, bottom: 0, background: 'rgba(0,0,0,0.5)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 2000 }}>
                                <div style={{ background: 'var(--bg-primary)', padding: '32px', borderRadius: '12px', maxWidth: '500px', width: '90%', maxHeight: '90vh', overflowY: 'auto' }}>
                                    <h3 style={{ marginBottom: '20px', color: 'var(--text-primary)' }}>
                                        {editingId ? 'Edit Novel' : 'Add New Novel'}
                                    </h3>
                                    <form onSubmit={handleSaveNovel} style={{ display: 'grid', gap: '12px' }}>
                                        <div>
                                            <label style={{ fontSize: '12px', fontWeight: '600', color: 'var(--text-primary)' }}>Title *</label>
                                            <input type="text" placeholder="e.g., Martial World" value={formData.title} onChange={(e) => setFormData({ ...formData, title: e.target.value })} style={{ width: '100%', padding: '10px', border: '1px solid var(--border-color)', borderRadius: '8px', background: 'var(--bg-secondary)', color: 'var(--text-primary)', marginTop: '6px' }} required />
                                        </div>
                                        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '12px' }}>
                                            <div>
                                                <label style={{ fontSize: '12px', fontWeight: '600', color: 'var(--text-primary)' }}>Total Chapters *</label>
                                                <input type="number" placeholder="1500" value={formData.totalChapters} onChange={(e) => setFormData({ ...formData, totalChapters: e.target.value })} style={{ width: '100%', padding: '10px', border: '1px solid var(--border-color)', borderRadius: '8px', background: 'var(--bg-secondary)', color: 'var(--text-primary)', marginTop: '6px' }} required />
                                            </div>
                                            <div>
                                                <label style={{ fontSize: '12px', fontWeight: '600', color: 'var(--text-primary)' }}>Current Chapter</label>
                                                <input type="number" placeholder="0" value={formData.currentChapter} onChange={(e) => setFormData({ ...formData, currentChapter: e.target.value })} style={{ width: '100%', padding: '10px', border: '1px solid var(--border-color)', borderRadius: '8px', background: 'var(--bg-secondary)', color: 'var(--text-primary)', marginTop: '6px' }} />
                                            </div>
                                        </div>
                                        <div>
                                            <label style={{ fontSize: '12px', fontWeight: '600', color: 'var(--text-primary)' }}>Author</label>
                                            <input type="text" placeholder="Author name" value={formData.author} onChange={(e) => setFormData({ ...formData, author: e.target.value })} style={{ width: '100%', padding: '10px', border: '1px solid var(--border-color)', borderRadius: '8px', background: 'var(--bg-secondary)', color: 'var(--text-primary)', marginTop: '6px' }} />
                                        </div>
                                        <div>
                                            <label style={{ fontSize: '12px', fontWeight: '600', color: 'var(--text-primary)' }}>Genre</label>
                                            <input type="text" placeholder="e.g., Fantasy, Sci-Fi" value={formData.genre} onChange={(e) => setFormData({ ...formData, genre: e.target.value })} style={{ width: '100%', padding: '10px', border: '1px solid var(--border-color)', borderRadius: '8px', background: 'var(--bg-secondary)', color: 'var(--text-primary)', marginTop: '6px' }} />
                                        </div>
                                        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '12px' }}>
                                            <div>
                                                <label style={{ fontSize: '12px', fontWeight: '600', color: 'var(--text-primary)' }}>Status</label>
                                                <select value={formData.status} onChange={(e) => setFormData({ ...formData, status: e.target.value })} style={{ width: '100%', padding: '10px', border: '1px solid var(--border-color)', borderRadius: '8px', background: 'var(--bg-secondary)', color: 'var(--text-primary)', marginTop: '6px' }}>
                                                    <option value="reading">Reading</option>
                                                    <option value="paused">Paused</option>
                                                    <option value="completed">Completed</option>
                                                    <option value="dropped">Dropped</option>
                                                </select>
                                            </div>
                                            <div>
                                                <label style={{ fontSize: '12px', fontWeight: '600', color: 'var(--text-primary)' }}>Rating</label>
                                                <input type="number" min="0" max="5" step="0.5" placeholder="4.5" value={formData.rating} onChange={(e) => setFormData({ ...formData, rating: parseFloat(e.target.value) || 0 })} style={{ width: '100%', padding: '10px', border: '1px solid var(--border-color)', borderRadius: '8px', background: 'var(--bg-secondary)', color: 'var(--text-primary)', marginTop: '6px' }} />
                                            </div>
                                        </div>
                                        <div>
                                            <label style={{ fontSize: '12px', fontWeight: '600', color: 'var(--text-primary)' }}>Cover Image URL</label>
                                            <input type="text" placeholder="https://example.com/cover.jpg" value={formData.imageUrl} onChange={(e) => setFormData({ ...formData, imageUrl: e.target.value })} style={{ width: '100%', padding: '10px', border: '1px solid var(--border-color)', borderRadius: '8px', background: 'var(--bg-secondary)', color: 'var(--text-primary)', marginTop: '6px' }} />
                                        </div>
                                        <div>
                                            <label style={{ fontSize: '12px', fontWeight: '600', color: 'var(--text-primary)' }}>Notes</label>
                                            <textarea placeholder="Your thoughts..." value={formData.notes} onChange={(e) => setFormData({ ...formData, notes: e.target.value })} style={{ width: '100%', padding: '10px', border: '1px solid var(--border-color)', borderRadius: '8px', background: 'var(--bg-secondary)', color: 'var(--text-primary)', marginTop: '6px', minHeight: '100px', fontFamily: 'inherit', resize: 'vertical' }} />
                                        </div>
                                        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '12px', marginTop: '12px' }}>
                                            <button type="submit" className="btn-primary" style={{ gridColumn: '1 / -1' }}>
                                                <i className="ti ti-check"></i> {editingId ? 'Update' : 'Add'}
                                            </button>
                                            <button type="button" className="btn-secondary" onClick={() => { setShowAddModal(false); resetForm(); }} style={{ gridColumn: '1 / -1' }}>
                                                Cancel
                                            </button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        )}

                        <button className="fab" onClick={() => setShowAddModal(true)}>
                            <i className="ti ti-plus"></i>
                        </button>
                    </div>
                </div>
            );
        }

        ReactDOM.render(<NovelTrackerUltimate />, document.getElementById('root'));
    </script>
</body>
</html>
